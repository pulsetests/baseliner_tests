on:
  [pull_request, workflow_dispatch]

name: Run commit tests
permissions:
  contents: read

jobs:
  commit-test:
    name: Run commit tests
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: "Checkout repository"
        uses: actions/checkout@v5
      - name: "Run tests"
        run: exit 0
